# 静态默认配置（构建时打包，随版本走）。architecture「配置分离」三层之一。
# 密钥不落此处：用 ${VAR_NAME} 引用环境变量，缺失则启动即拒（见 config/index.ts）。
# 用户运行时增删的 Source / Topic 落 SQLite（动态配置），覆盖 / 扩充本默认。

models:
  analyzer: claude-sonnet-4-6
  validator: claude-opus-4-7
  apiKey: ${ANTHROPIC_API_KEY} # 唯一来源 = 环境变量；启动解析，缺失即拒

rateLimit:
  perAccountPerMin: 60
  perIpPerMin: 120

system:
  ingestConcurrency: 1
  reportP50TargetMin: 10

# 领域级宽主题（每域 1 个），吃下该域全部源；id 保持稳定（被源/评测/历史报告引用，不可改）。
# 关键词放宽到覆盖领域全貌，analyzer 据此在宽源里提炼本域相关洞察。分类靠 facets：
#   - domain（学科域，必填）：software-engineering / security / foundation-models（无 ai- 前缀——AI 是产品级恒定前提）。
#   - lens（视角，选填；不标视作 technical）：technical / business。把「产业视角」从 domain 解放（取代旧 domain:ai-industry）。
# 例外：t_ai_industry（AI 产业动态）是窄主题——专收泛 AI 厂商 PR（如 OpenAI News）：这类源信号广但与
# 「软件工程」相关度低，挂 t_code_agents 从不被引（贡献 0），故单列归口、让其在对的池子里竞争
# （2026-06-22；ADR-0010 后续：域=foundation-models、视角 lens:business）。
#
# ⚠️ keywords 真相源是生产 DB（设置页可在线精修）；本处仅在「空库 seed」时生效，按 id 幂等、永不覆盖已存在 topic。
# 下列 keywords 已于 2026-06-27 反向同步自生产库 UI 精修的英文 taxonomy，使 DR/全新部署 re-seed 不再回退到旧草稿。
# 若日后在设置页改了关键词，务必同步回此处（注意 updateTopic 的 updated_at 已修复会 bump，可据时间戳判断是否漂移）。
defaultTopics:
  - id: t_code_agents
    name: AI 时代的软件工程
    keywords:
      ["Coding Agent", "Code Agent", "Agentic Software Engineering", "Agentic SWE", "AI-Native Development",
       "Prompt Engineering", "Context Engineering", "Harness Engineering", "Code Model",
       "Intelligent Software Engineering", "Vibe Coding", "Claude Code", "Codex", "Cursor", "Devin",
       "SPEC", "Skills", "Trustworthy AI Code", "Provenance & Traceability", "AI Code Review"]
    language: zh
    brief_schedule: daily
    enabled: true
    archetype: deep_vertical
    facets: [domain:software-engineering, lens:technical]
  - id: t_prompt_injection
    name: AI 时代的安全
    keywords:
      ["Prompt Injection", "Jailbreaking", "Data Poisoning", "Model Poisoning", "Model Extraction",
       "Adversarial Examples", "Training Data Leakage", "Membership Inference", "OWASP LLM Top 10",
       "Agentic Security", "AI Supply Chain", "AI-Powered Attacks", "Automated Vuln Discovery", "Deepfake",
       "AI Phishing", "Malicious Code Generation", "Scaled Social Engineering", "AI-Driven Threat Detection",
       "AI-Augmented SOC", "Automated Incident Response", "AI Security Review", "Automated Patching",
       "AI Red Teaming", "AI Alignment & Safety", "Trustworthy AI", "AI Governance",
       "Data Privacy & Sovereignty", "Guardrails", "Zero Trust for AI"]
    language: zh
    brief_schedule: daily
    enabled: true
    archetype: deep_vertical
    facets: [domain:security, lens:technical]
  # 泛 AI 厂商动态（窄主题，例外见上）：归口 OpenAI News 等泛 PR 源。域=基础模型、视角=产业。
  - id: t_ai_industry
    name: AI 产业动态
    keywords:
      [OpenAI, Anthropic, Claude, Gemini, Llama, GPT, ChatGPT, Nvidia, 模型发布, 产品发布, API,
       开发者工具, AI 融资, funding, valuation, acquisition, IPO, 并购, 监管政策, 行业应用, 大模型,
       AI 商业化, 算力, compute, GPU, data center, 数据中心, 芯片]
    language: zh
    brief_schedule: daily
    enabled: true
    archetype: horizontal_pulse  # ADR-0010：态势感知型——相关性硬下限砍纯噪声
    facets: [domain:foundation-models, lens:business]  # 基础模型域 + 产业视角（lens 把产业视角从 domain 解放）

# MVP 首版接入清单（source-feasibility.md 末节，17 ✅ 推荐源 → 23 feed）。
# 全部走现有 rss / arxiv 适配器（GitHub Atom、播客 RSS 均由 rss 适配器的 Atom/RSS 分支处理）。
# topic_ids 按主题映射：两个行业宽主题（t_code_agents / t_prompt_injection）+ 窄主题例外
# t_ai_industry（归口泛 AI 厂商 PR）；宽主题偏窄、未充分利用源广度，待后续按行业扩主题（见 roadmap）。
defaultSources:
  # ── AI 时代的软件工程（software-engineering → t_code_agents）──
  - id: src_hn
    name: Hacker News
    type: rss
    endpoint: https://news.ycombinator.com/rss
    topic_ids: [t_code_agents]
    fetch_interval: 1h
    enabled: true
  - id: src_arxiv_se
    name: arXiv cs.SE
    type: arxiv
    endpoint: http://export.arxiv.org/api/query?search_query=cat:cs.SE&sortBy=submittedDate&sortOrder=descending&max_results=30
    topic_ids: [t_code_agents]
    fetch_interval: 6h
    enabled: true
  - id: src_arxiv_cl
    name: arXiv cs.CL
    type: arxiv
    endpoint: http://export.arxiv.org/api/query?search_query=cat:cs.CL&sortBy=submittedDate&sortOrder=descending&max_results=30
    topic_ids: [t_code_agents]
    fetch_interval: 6h
    enabled: true
  - id: src_arxiv_ai
    name: arXiv cs.AI
    type: arxiv
    endpoint: http://export.arxiv.org/api/query?search_query=cat:cs.AI&sortBy=submittedDate&sortOrder=descending&max_results=30
    topic_ids: [t_code_agents]
    fetch_interval: 6h
    enabled: true
  - id: src_openai_news
    name: OpenAI News
    type: rss
    endpoint: https://openai.com/news/rss.xml
    # 泛 AI 厂商 PR（健康/化学/产品），176 字 SPA 摘要 full_text 救不了；挂 t_code_agents 从不被引（贡献 0）。
    # 2026-06-22 改归口到 t_ai_industry（AI 产业动态），让它在对的主题池里竞争。
    topic_ids: [t_ai_industry]
    fetch_interval: 6h
    enabled: true

  # ── AI 产业动态（foundation-models / business → t_ai_industry）补充源 ──
  # 2026-06-26 生产 IP 实测可达 + 内容契合后接入（详见 practice-log）。
  - id: src_semianalysis
    name: SemiAnalysis
    type: rss
    endpoint: https://www.semianalysis.com/feed
    # 算力/基建/供应链/资本支出经济学（Dylan Patel）。全文在 feed（content:encoded）→ 无需 full_text。
    topic_ids: [t_ai_industry]
    fetch_interval: 24h
    enabled: true
  - id: src_importai
    name: Import AI（Jack Clark · newsletter）
    type: rss
    endpoint: https://importai.substack.com/feed
    # 政策+产业周报，全文在 feed（content:encoded）→ 无需 full_text，低噪声。
    topic_ids: [t_ai_industry]
    fetch_interval: 24h
    enabled: true
  - id: src_anthropic_news
    name: Anthropic News（社区 feed）
    type: rss
    # 官方无 RSS，用社区维护 feed（可行性文档实测有效）；与 OpenAI News 对称。content-type 为 text/plain，
    # rss 适配器按内容解析。feed 仅短摘要 → full_text 抓 anthropic.com/news 文章页（服务端渲染，2026-06-26 实测 6.7K 字；
    # 无具名容器，回退 <body>，过 MIN_ARTICLE_CHARS；上线后视噪声再定 content_container）。
    endpoint: https://raw.githubusercontent.com/Olshansk/rss-feeds/main/feeds/feed_anthropic_news.xml
    topic_ids: [t_ai_industry]
    fetch_interval: 6h
    enabled: true
    fetch_mode: full_text
  - id: src_techcrunch_ai
    name: TechCrunch AI
    type: rss
    endpoint: https://techcrunch.com/category/artificial-intelligence/feed/
    # 融资/并购/创业。feed 仅短摘要 → full_text 抓文章页；正文容器 class=entry-content（WordPress 标准，2026-06-26 实测）。
    topic_ids: [t_ai_industry]
    fetch_interval: 6h
    enabled: true
    fetch_mode: full_text
    content_container: entry-content
  - id: src_google_research
    name: Google Research Blog
    type: rss
    endpoint: https://research.google/blog/rss/
    topic_ids: [t_code_agents]
    fetch_interval: 6h
    enabled: true
    # RSS 仅给摘要(~20字)→ 按 URL 抓文章页全文(ADR-0008 决定③);正文容器 class=rich_text(生产实测)
    fetch_mode: full_text
    content_container: rich_text
  - id: src_githubnext
    name: GitHub Next
    type: rss
    endpoint: https://githubnext.com/rss.xml
    topic_ids: [t_code_agents]
    fetch_interval: 24h
    enabled: true
  - id: src_github_eng
    name: GitHub Engineering Blog
    type: rss
    endpoint: https://github.blog/category/engineering/feed/
    topic_ids: [t_code_agents]
    fetch_interval: 24h
    enabled: true
  - id: src_latent_space
    name: Latent Space
    type: rss
    endpoint: https://www.latent.space/feed
    topic_ids: [t_code_agents]
    fetch_interval: 12h
    enabled: true
  - id: src_pragmatic_eng
    name: The Pragmatic Engineer
    type: rss
    endpoint: https://newsletter.pragmaticengineer.com/feed
    topic_ids: [t_code_agents]
    fetch_interval: 24h
    enabled: true
  - id: src_practical_ai
    name: Practical AI（播客 · 转写）
    type: rss
    endpoint: https://feeds.transistor.fm/practical-ai-machine-learning-data-science-llm
    topic_ids: [t_code_agents]
    fetch_interval: 24h
    enabled: true
    # feed 自带 <podcast:transcript type=text/plain>（非 captions）全文转写 → pickTranscriptUrl 直接取、
    # ADR-0007 已上线（2026-06-20 golive 实测带 transcript）。旧名「元数据」是上线前旧文，此处订正。
  - id: src_changelog
    name: The Changelog（播客 · 转写）
    type: rss
    endpoint: https://changelog.com/podcast/feed
    topic_ids: [t_code_agents]
    fetch_interval: 24h
    enabled: true
    # 软件工程本体播客，AI 编码工具覆盖密。feed 自带 <podcast:transcript type=text/html> 转写 URL
    # （changelog.com/.../transcript）→ parseRss 自动取，无需金牌适配器；转写页为 <cite>/<p> 极简结构，
    # 由 fetchTranscript 的 extractCiteTranscript 抽取（2026-06-26 生产实测）。
  # Lex Fridman：转写不在 feed、官网有规律转写页（ADR-0007 6d 金牌源适配器）。选题极宽，
  # 由 podcast-golden.ts 的标题筛子只留 AI/CS/SWE 集（实测命中率约 1/4），转写 URL 由单集页推导。
  - id: src_lex_fridman
    name: Lex Fridman Podcast（播客 · 转写 · AI/SWE 筛选）
    type: rss
    endpoint: https://lexfridman.com/feed/podcast/
    topic_ids: [t_code_agents]
    fetch_interval: 24h
    enabled: true
  - id: src_qbitai
    name: 量子位
    type: rss
    endpoint: https://www.qbitai.com/feed
    topic_ids: [t_code_agents]
    fetch_interval: 6h
    enabled: true
    # RSS 仅给标题(~17字)→ 按 URL 抓文章页全文(ADR-0008 决定③);正文容器 class=article(生产实测 47→4926字)
    fetch_mode: full_text
    content_container: article
  - id: src_infoq_ai
    name: InfoQ AI/ML/Data
    type: rss
    endpoint: https://feed.infoq.com/ai-ml-data-eng
    topic_ids: [t_code_agents]
    fetch_interval: 6h
    enabled: true
  # ── t_code_agents 补充源（2026-06-26 接入）：补「从业者/工程学科」与「编码 agent 工具」两轴，
  #    平衡原集合偏研究 + 偏实验室官博。生产 SG IP 实测可达（无 WAF 拦）+ 正文容器抽取见 ops/aws/probe-sources.sh。
  - id: src_simonwillison
    name: Simon Willison's Weblog
    type: rss
    endpoint: https://simonwillison.net/atom/everything/
    topic_ids: [t_code_agents]
    fetch_interval: 6h
    enabled: true
    # 实用 LLM/编码工具最高信噪比个人作者，近日更。feed 仅 <summary> → full_text 抓正文页
    # （生产实测全局容器命中 1847 字，无需 content_container 覆盖；2026-06-26）。
    fetch_mode: full_text
  - id: src_martinfowler
    name: Martin Fowler
    type: rss
    endpoint: https://martinfowler.com/feed.atom
    topic_ids: [t_code_agents]
    fetch_interval: 24h
    enabled: true
    # 「软件工程学科」轴（Böckeler「Exploring Gen AI」系列）。全文在 feed <content>（长文分期连载，
    # 每条给一截，>200 下限）→ 无需 full_text（2026-06-26 生产实测）。
  - id: src_aider
    name: Aider
    type: rss
    endpoint: https://aider.chat/feed.xml
    topic_ids: [t_code_agents]
    fetch_interval: 24h
    enabled: true
    # 编码 agent/评测轴（绑定 SWE-bench/polyglot 关键词）。feed.xml 整篇带全文（实测首条 10746 字）
    # → 无需 full_text（2026-06-26 生产实测，纠正先验 full_text 猜测）。

  # ── AI 时代的安全（security → t_prompt_injection）──
  - id: src_thehackernews
    name: The Hacker News
    type: rss
    endpoint: https://feeds.feedburner.com/TheHackersNews
    topic_ids: [t_prompt_injection]
    fetch_interval: 6h
    enabled: true
  - id: src_krebs
    name: KrebsOnSecurity
    type: rss
    endpoint: https://krebsonsecurity.com/feed/
    topic_ids: [t_prompt_injection]
    fetch_interval: 12h
    enabled: true
  - id: src_bleeping
    name: Bleeping Computer
    type: rss
    endpoint: https://www.bleepingcomputer.com/feed/
    topic_ids: [t_prompt_injection]
    fetch_interval: 6h
    # 2026-05-31 实测：Cloudflare 主动挑战（cf-mitigated=challenge，"Just a moment..." JS 页），
    # 按 IP 信誉 + TLS 指纹判定，UA/Cookie/Headers 均无效；需 FlareSolverr/headless 中转方可绕
    # （重 + 灰）。安全报道与 THN / Krebs / Risky Business 高度重叠，损失小。下架。
    enabled: false
  - id: src_arxiv_cr
    name: arXiv cs.CR
    type: arxiv
    endpoint: http://export.arxiv.org/api/query?search_query=cat:cs.CR&sortBy=submittedDate&sortOrder=descending&max_results=30
    topic_ids: [t_prompt_injection]
    fetch_interval: 6h
    enabled: true
  - id: src_owasp_llm
    name: OWASP LLM Top 10（GitHub releases）
    type: rss
    endpoint: https://github.com/OWASP/www-project-top-10-for-large-language-model-applications/releases.atom
    topic_ids: [t_prompt_injection]
    fetch_interval: 24h
    enabled: true
  - id: src_owasp_ai
    name: OWASP AI Exchange（GitHub commits）
    type: rss
    endpoint: https://github.com/OWASP/www-project-ai-security-and-privacy-guide/commits.atom
    topic_ids: [t_prompt_injection]
    fetch_interval: 24h
    # 2026-06-27 生产数据审计停用：满曝光 27 天、采 46 条、**0 被引、0 洞察**（Darknet 同款）。
    # 根因=endpoint 用 commits.atom，全是 "update X.md/permalink" 型碎片提交、不可引；releases/tags
    # 均空壳（仅 v0.0.0 占位）、owaspai.org 无 RSS → 无可用替代 feed。标准/框架基线由 mitre_atlas
    # （2 条→15 洞察，证明知识库源能被引）+ owasp_llm 兜。下线。
    enabled: false
  - id: src_mitre_atlas
    name: MITRE ATLAS（GitHub releases）
    type: rss
    endpoint: https://github.com/mitre-atlas/atlas-data/releases.atom
    topic_ids: [t_prompt_injection]
    fetch_interval: 24h
    enabled: true
  - id: src_risky_biz
    name: Risky Business（播客 · show notes）
    type: rss
    endpoint: https://risky.biz/feeds/risky-business/
    topic_ids: [t_prompt_injection]
    fetch_interval: 24h
    enabled: true
  - id: src_darknet_diaries
    name: Darknet Diaries（播客 · show notes）
    type: rss
    endpoint: https://podcast.darknetdiaries.com/
    topic_ids: [t_prompt_injection]
    fetch_interval: 24h
    # 2026-06-26 生产数据审计停用：175 条入库、**0 被引、0 洞察**——叙事型黑客故事播客，
    # 与「AI 时代的安全」（注入/agent/漏洞情报）主题错配，在 deep_vertical 不过滤下纯稀释分析池。
    enabled: false
  - id: src_freebuf
    name: FreeBuf
    type: rss
    endpoint: https://www.freebuf.com/feed
    topic_ids: [t_prompt_injection]
    fetch_interval: 6h
    # 2026-05-31 实测：URL 正确（本机 curl 200 + 真 RSS XML），但容器内被阿里云盾边缘节点
    # 拦下伪 405（server=Tengine 而非起源 fbserver/1.1），按出口段 + TLS 指纹反爬，UA 无效；
    # 本地 + 境内 VPS 均拦，境外 VPS 待测。下架，境外部署时可试重启。
    enabled: false

  # ── AI 安全垂直补充源（2026-06-26 生产数据审计后接入，填「AI-专属源」缺口）──
  # 现状短板：主题叫「AI 安全」但垂直源几乎只有 arXiv，资讯靠通用网安站顺带捞。均生产 IP 实测可达。
  - id: src_embracethered
    name: Embrace The Red（Johann Rehberger · LLM/agent 攻击）
    type: rss
    endpoint: https://embracethered.com/blog/index.xml
    # 实战 LLM/agent 攻击（注入/数据外泄/agent 越权），AI-安全关键词命中 1069（最高）、标题全同频。
    # feed 仅短摘要 → full_text 抓文章页（Hugo 服务端渲染，无具名容器回退 <body>）。
    topic_ids: [t_prompt_injection]
    fetch_interval: 24h
    enabled: true
    fetch_mode: full_text
  - id: src_trailofbits
    name: Trail of Bits Blog
    type: rss
    endpoint: https://blog.trailofbits.com/feed/
    # appsec/crypto/工具 + 部分 AI/ML 安全。feed 短摘要 → full_text，容器 class=entry-content（WordPress 实测）。
    topic_ids: [t_prompt_injection]
    fetch_interval: 24h
    enabled: true
    fetch_mode: full_text
    content_container: entry-content
  - id: src_project_zero
    name: Google Project Zero
    type: rss
    endpoint: https://googleprojectzero.blogspot.com/feeds/posts/default
    # 精英漏洞研究（全文在 feed，无需 full_text）。偏通用、AI 占比低 → 当漏洞情报补充，上线后看采纳定去留。
    # 2026-06-27 审计：feed 正常（200/10 条），但 PZ 月更级低频、最新帖 45 天前（早于 30 天冷启动窗）→
    # 6/25 接入后 0 采集是预期正确行为，非故障。保留，下次 PZ 发帖即采。
    topic_ids: [t_prompt_injection]
    fetch_interval: 24h
    enabled: true
  # 注：src_simonwillison（everything feed）已存在、归 t_code_agents；本条是**另一个 feed**
  # （prompt-injection tag）专供安全主题，故用独立 id，不与之冲突。
  - id: src_simonwillison_promptinj
    name: Simon Willison（prompt-injection tag）
    type: rss
    # "prompt injection" 一词提出者；用 prompt-injection tag feed（实测命中密度 960，远胜 everything/llms/security
    # 全量 feed 的 datasette/dev 噪声）。link-blog 短评全文在 atom，无需 full_text。
    endpoint: https://simonwillison.net/tags/prompt-injection.atom
    topic_ids: [t_prompt_injection]
    fetch_interval: 12h
    enabled: true
  # 2026-06-20 直接 seed 进生产、未回流本配置（config 漂移）；2026-06-27 审计实证有效（采 25 / 被引 14 /
  # 3 洞察，AWS 新加坡 IP 可达，feasibility 列 backlog 的 api.anquanke.com RSS 成立）→ 反向同步进此处，
  # 否则 DR/全新部署 re-seed 会丢掉这个能用的中文源。中文综合安全资讯，feed 短摘要 → full_text。
  - id: src_anquanke
    name: 安全客
    type: rss
    endpoint: https://api.anquanke.com/data/v1/rss
    topic_ids: [t_prompt_injection]
    fetch_interval: 2h
    enabled: true
    fetch_mode: full_text
