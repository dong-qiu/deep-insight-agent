name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# 同分支新推送取消旧跑，省额度
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # eval 门禁兜底：改了 AI 质量面(agents/sources/llm.ts/dataset)的 PR 必须带 Eval-Gate 盖章
  # （= 已在本地跑过 /eval-gate 对比基线）。与 .githooks/pre-push 同款判定脚本；这里绕不过
  # （--no-verify / EVAL_GATE_ACK 只绕本地 hook，不影响 CI）。本 job 不跑真模型 eval（要 key/
  # 预算，见 verify job 注释与 eval.yml）——只校验盖章这个承诺存在。
  eval-gate:
    name: eval-gate (trailer)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: require Eval-Gate stamp on AI-quality changes
        run: bash .githooks/eval-gate-check.sh "${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}"

  verify:
    name: typecheck · test · build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      # vitest 覆盖确定性 eval 逻辑（reachability/verdict/选片/分批/repairQuote 等，无需 key）。
      # 真模型 eval（npm run eval:a1）+ 回归门需 API 凭据 + 预算 + 中转站 → 不在公共 CI 跑，
      # 改由定时 workflow `.github/workflows/eval.yml`（每周 + 手动，用 relay secrets）运行；
      # 见 docs/plan/m3-plan.md M3-4、docs/launch/operations.md §13。
      - run: npm test
      - name: next build
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: "1"
      # 供应链：高危依赖漏洞可见（不阻断，先观测）
      - name: npm audit
        run: npm audit --audit-level=high
        continue-on-error: true

  docker:
    name: docker build
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: deep-insight:ci
          build-args: |
            TARGETARCH=amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max
