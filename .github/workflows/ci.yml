name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# 同分支新推送取消旧跑，省额度
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: typecheck · test · build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - name: next build
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: "1"
      # 供应链：高危依赖漏洞可见（不阻断，先观测）
      - name: npm audit
        run: npm audit --audit-level=high
        continue-on-error: true

  docker:
    name: docker build
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: deep-insight:ci
          build-args: |
            TARGETARCH=amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max
