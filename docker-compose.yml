# 自托管单实例编排（architecture「部署」）：app(Web/Job Runner) + cron(容器内调度) + 持久卷。
# 用法：cp .env.example .env.local 并填好 ANTHROPIC_API_KEY / AUTH_SECRET / ADMIN_* / CRON_SECRET，
#       然后 `docker compose up -d --build`。两服务复用同一镜像（tag 锁定，不用 latest）。
#
# 工程名 = compose 自动取的目录 basename（本文件不写死 name:）。各 worktree 目录不同 →
#   容器名与数据卷 <工程名>_insight-data 默认天然隔离，零配置即可并行起多套、互不串库。
# ⚠️ 权威/生产实例（拥有真数据）必须在自己目录的 .env 钉 COMPOSE_PROJECT_NAME=deep-insight，
#   否则换目录跑会回落新工程名 → 挂到新空卷、孤立现有数据（见 .env.compose.example）。
# 同时起多套时各 worktree 还需设 APP_PORT（端口不随目录自动分配，缺省 3000 会相互占用）。

services:
  app:
    build:
      context: .
      args:
        # 本机构建用 host 架构；amd64/arm64 均有 supercronic 校验和（见 Dockerfile）
        TARGETARCH: ${TARGETARCH:-amd64}
    image: deep-insight:0.1.0
    restart: unless-stopped
    env_file: [.env.local]
    ports:
      - "${APP_PORT:-3000}:3000"
    volumes:
      - insight-data:/data
    # 运行镜像是 slim、无 curl（见 Dockerfile）——healthcheck 必须用 Node fetch，否则探针永远失败、
    # app 永不 healthy、cron(depends_on service_healthy) 起不来。与 Dockerfile 的 HEALTHCHECK 一致。
    healthcheck:
      test: ["CMD", "node", "--no-warnings", "-e", "fetch('http://127.0.0.1:'+(process.env.PORT||3000)+'/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  cron:
    image: deep-insight:0.1.0
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    env_file: [.env.local]
    # 挂同一持久卷：cron 内每日备份任务（ops/backup-db.mjs）要直接读 /data/insight.db
    # 并把备份写进 /data/backups。SQLite 在线备份 API 对 app 的并发写安全（WAL + 页级锁）。
    volumes:
      - insight-data:/data
    environment:
      # crontab 内 curl 的目标（容器网络内按服务名解析）
      APP_URL: http://app:3000
    command: ["supercronic", "/app/ops/crontab"]
    # cron 跑 supercronic、非 Web 服务——禁用从镜像继承的 Web 健康探针（否则 fetch :3000 永远失败、误报 unhealthy）。
    healthcheck:
      disable: true

volumes:
  insight-data:
